<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athlete Profile</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<main class="section" style="text-align:center;">

  <h1 id="name"></h1>
  <p id="score" style="margin-bottom:20px;"></p>

  <div class="compare-toggle">
  <button onclick="setCompareMode('team')" class="active" id="btn-team">Team</button>
  <button onclick="setCompareMode('top5')" id="btn-top5">Top 5</button>
  <button onclick="setCompareMode('weight')" id="btn-weight">Weight Group</button>
</div>

  <div style="max-width: 500px; margin: auto;">
    <canvas id="radarChart"></canvas>
  </div>

  <!-- Metrics -->
  <div id="metrics" class="grid" style="margin-top:30px;"></div>

</main>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS81ri1sMtpBVl605PVV_Te2WdA3hVohdXIb1Lc22CrUJSdzXUzGa-0Z0THGtlSa9WVaa77owi-_BAR/pub?output=csv";

/* ================= GLOBAL ================= */

let compareMode = "team";
let ALL_ROWS = [];
let CURRENT_ATHLETE = null;

/* ================= BUTTON ================= */

function setCompareMode(mode) {
  compareMode = mode;

  document.querySelectorAll(".compare-toggle button")
    .forEach(btn => btn.classList.remove("active"));

  document.getElementById(`btn-${mode}`).classList.add("active");

  updateComparison();
}

/* ================= NAME ================= */

const params = new URLSearchParams(window.location.search);
const selectedName = (params.get("name") || "").trim().toLowerCase();

document.getElementById("name").textContent =
  decodeURIComponent(params.get("name") || "");

/* ================= HELPERS ================= */

function cleanNum(val) {
  return Number((val || "").replace(/\r/g, "").trim()) || 0;
}

function extractMetrics(row) {
  const bench = cleanNum(row[6]);
  const squat = cleanNum(row[8]);
  const clean = cleanNum(row[10]);
  const vertical = cleanNum(row[12]);
  const broad = cleanNum(row[14]);
  const medBall = cleanNum(row[16]);
  const proAgility = cleanNum(row[18]); // was agility
  const situps = cleanNum(row[20]);
  const dash10 = cleanNum(row[22]);
  const dash40 = cleanNum(row[24]);

  return {
    strength: bench + squat + situps,        // ✅ added situps
    power: clean + vertical,
    explosive: broad + medBall,
    speed: dash10 + dash40 + proAgility      // ✅ added pro agility
  };
}

function calculateRankings(playerMetrics) {

  const validRows = ALL_ROWS.filter(r => {
  const name = (r[0] || "").trim();
  return name !== "";
});

const allMetrics = validRows.map(r => extractMetrics(r));

  function getRank(metric) {
    const values = allMetrics.map(m => m[metric]).sort((a,b) => b - a);

    const playerVal = playerMetrics[metric];

    const rank = values.findIndex(v => playerVal >= v) + 1;
    const total = values.length;

    const percentile = Math.round((1 - (rank - 1) / total) * 100);

    return {
      rank,
      total,
      percentile
    };
  }

  return {
  speed: getRank("speed"),
  strength: getRank("strength"),
  power: getRank("power"),
  explosive: getRank("explosive")
};
}

function norm(val) {
  return Math.min(val / 5, 100);
}

/* ================= LOAD DATA ================= */

Papa.parse(CSV_URL + "&t=" + Date.now(), {
  download: true,
  skipEmptyLines: true,

  complete: function(results) {

    const rows = results.data;

    let athlete = null;

    rows.forEach(row => {
      const name = (row[0] || "").trim().toLowerCase();
      if (name === selectedName) athlete = row;
    });

    if (!athlete) {
      document.getElementById("score").textContent = "No data found";
      return;
    }

    ALL_ROWS = rows;
    CURRENT_ATHLETE = athlete;

    const score = cleanNum(athlete[30]);

    document.getElementById("score").innerHTML =
      `<span style="font-size:18px;">Score: ${score}</span>`;

    updateComparison(); // 🔥 initial render
  }
});

/* ================= COMPARISON ENGINE ================= */

function updateComparison() {

  const player = extractMetrics(CURRENT_ATHLETE);

  let group = [];

  if (compareMode === "team") {
    group = ALL_ROWS.filter(r => {
  const name = (r[0] || "").trim();
  return name !== "" && r !== CURRENT_ATHLETE;
});
  }

  if (compareMode === "top5") {
    group = ALL_ROWS
  .filter(r => (r[0] || "").trim() !== "")
      .sort((a, b) => cleanNum(b[30]) - cleanNum(a[30]))
      .slice(0, 5);
  }

  if (compareMode === "weight") {
    const weight = cleanNum(CURRENT_ATHLETE[5]);

    group = ALL_ROWS.filter(r => {
  const name = (r[0] || "").trim();
  if (!name) return false;

  const w = cleanNum(r[5]);
  return Math.abs(w - weight) <= 10 && r !== CURRENT_ATHLETE;
});
  }

  let totals = { speed:0, strength:0, power:0, explosive:0 };

  group.forEach(r => {
    const m = extractMetrics(r);
    totals.speed += m.speed;
    totals.strength += m.strength;
    totals.power += m.power;
    totals.explosive += m.explosive;
  });

  const count = group.length || 1;

  const avg = {
  speed: totals.speed / count,
  strength: totals.strength / count,
  power: totals.power / count,
  explosive: totals.explosive / count
};

  renderRadarChart(player, avg);
  renderRankings(player);
}

function getTier(p) {
  if (p >= 90) return "elite";
  if (p >= 75) return "strong";
  if (p >= 50) return "average";
  return "developing";
}

function renderRankings(playerMetrics) {

  const ranks = calculateRankings(playerMetrics);

  const container = document.getElementById("metrics");

  function card(label, data) {
    return `
      <div class="card">
        <h3>${label}</h3>
        <p>#${data.rank} / ${data.total}</p>
        <p style="color:#3b82f6; font-weight:600;">
          <span class="tier-${getTier(data.percentile)}">
  Top ${data.percentile}%
</span>
        </p>
      </div>
    `;
  }

  container.innerHTML = `
    ${card("Speed", ranks.speed)}
    ${card("Strength", ranks.strength)}
    ${card("Power", ranks.power)}
    ${card("Explosive", ranks.explosive)}
  `;
}

/* ================= CHART ================= */

function renderRadarChart(player, avg) {

  const ctx = document.getElementById("radarChart");

  if (window.radarChart && typeof window.radarChart.destroy === "function") {
    window.radarChart.destroy();
  }

  window.radarChart = new Chart(ctx, {
    type: "radar",
    data: {
      labels: ["Speed", "Strength", "Power", "Explosive"],
      datasets: [
        {
          label: "Athlete",
          data: [
  norm(player.speed),
  norm(player.strength),
  norm(player.power),
  norm(player.explosive)
],
          backgroundColor: "rgba(59,130,246,0.4)",
          borderColor: "#3b82f6"
        },
        {
          label: "Comparison",
          data: [
  norm(player.speed),
  norm(player.strength),
  norm(player.power),
  norm(player.explosive)
],
          backgroundColor: "rgba(255,255,255,0.15)",
          borderColor: "#aaa"
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "#ccc" }
        }
      },
      scales: {
        r: {
          beginAtZero: true,
          suggestedMax: 100,
          ticks: { display: false }
        }
      }
    }
  });
}

</script>



</body>
</html>
