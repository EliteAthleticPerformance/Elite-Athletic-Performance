<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Performance Comparison</title>
<script>
  window.pageTitle = "Performance Comparison";
</script>

<link rel="stylesheet" href="styles.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>

<main>

  <!-- ===== ATHLETE HEADER ===== -->
  <section class="section" style="text-align:center;">
    
    <h1 id="name"></h1>
    <p id="score" style="margin-bottom:20px;"></p>

    <p style="margin-top:20px;">Compare To:</p>

    <div class="compare-toggle">
  <button onclick="setCompareMode('last')" id="btn-last">Most Recent Score</button>
  <button onclick="setCompareMode('team')" class="active" id="btn-team">Team</button>
  <button onclick="setCompareMode('top5')" id="btn-top5">Top 5</button>
  <button onclick="setCompareMode('weight')" id="btn-weight">Weight Group</button>
  <button onclick="setCompareMode('grade')" id="btn-grade">Grade</button>
</div>

  </section>

  <!-- ===== CHART ===== -->
  <section class="section" style="text-align:center;">
    <div style="max-width: 750px; margin: auto;">
      <canvas id="radarChart"></canvas>
    </div>
  </section>

  <!-- ===== METRICS ===== -->
  <section class="section">
    <div id="metrics" class="grid"></div>
  </section>

</main>


  <!-- ===== SCRIPT ===== -->
  <script src="js/header.js"></script>
<script src="js/history.js"></script>

</body>
</html>
