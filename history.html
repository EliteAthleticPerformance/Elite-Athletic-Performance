<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athlete Profile</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<main class="section" style="text-align:center;">

  <h1 id="name"></h1>
  <p id="score" style="margin-bottom:20px;"></p>

  <div style="max-width: 500px; margin: auto;">
    <canvas id="radarChart"></canvas>
  </div>

  <!-- Metrics -->
  <div id="metrics" class="grid" style="margin-top:30px;"></div>

</main>



<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS81ri1sMtpBVl605PVV_Te2WdA3hVohdXIb1Lc22CrUJSdzXUzGa-0Z0THGtlSa9WVaa77owi-_BAR/pub?output=csv";

// ---------- GET NAME ----------
const params = new URLSearchParams(window.location.search);
const selectedName = (params.get("name") || "").trim().toLowerCase();

document.getElementById("name").textContent = decodeURIComponent(params.get("name") || "");

// ---------- CLEAN ----------
function cleanNum(val) {
  return Number((val || "").replace(/\r/g, "").trim()) || 0;
}

// ---------- LOAD ----------
Papa.parse(CSV_URL + "&t=" + Date.now(), {
  download: true,
  skipEmptyLines: true,

  complete: function(results) {

    const rows = results.data;

    let athlete = null;
    const others = [];

    rows.forEach(row => {
      const name = (row[0] || "").trim().toLowerCase();

      if (!name) return;

      if (name === selectedName) {
        athlete = row;
      } else {
        others.push(row);
      }
    });

    if (!athlete) {
      document.getElementById("score").textContent = "No data found";
      return;
    }

    // ---------- EXTRACT FUNCTION ----------
    function extractMetrics(row) {
      const bench = cleanNum(row[6]);
      const squat = cleanNum(row[8]);
      const clean = cleanNum(row[10]);
      const vertical = cleanNum(row[12]);
      const broad = cleanNum(row[14]);
      const medBall = cleanNum(row[16]);
      const agilityRaw = cleanNum(row[18]);
      const situps = cleanNum(row[20]);
      const dash10 = cleanNum(row[22]);
      const dash40 = cleanNum(row[24]);

      return {
        strength: bench + squat,
        power: clean + vertical,
        explosive: broad + medBall,
        agility: agilityRaw + situps,
        speed: dash10 + dash40
      };
    }

    // ---------- ATHLETE ----------
    const athleteMetrics = extractMetrics(athlete);

    const score = cleanNum(athlete[30]);

    // ---------- TEAM AVERAGE ----------
    let totals = {
      speed: 0,
      strength: 0,
      power: 0,
      agility: 0,
      explosive: 0
    };

    others.forEach(o => {
      const m = extractMetrics(o);
      totals.speed += m.speed;
      totals.strength += m.strength;
      totals.power += m.power;
      totals.agility += m.agility;
      totals.explosive += m.explosive;
    });

    const count = others.length || 1;

    const avg = {
      speed: totals.speed / count,
      strength: totals.strength / count,
      power: totals.power / count,
      agility: totals.agility / count,
      explosive: totals.explosive / count
    };

    // ---------- NORMALIZE ----------
    function norm(val) {
      return Math.min(val / 5, 100);
    }

    // ---------- UI ----------
    document.getElementById("score").innerHTML = `
      <span style="font-size:18px;">Score: ${score}</span>
    `;

    renderRadarChart(
      athleteMetrics,
      avg
    );

  }
});

// ---------- CHART ----------
function renderRadarChart(player, avg) {

  const ctx = document.getElementById("radarChart");

  if (window.radarChart) {
    window.radarChart.destroy();
  }

  window.radarChart = new Chart(ctx, {
    type: "radar",
    data: {
      labels: ["Speed", "Strength", "Power", "Agility", "Explosive"],
      datasets: [
        {
          label: "Athlete",
          data: [
            norm(player.speed),
            norm(player.strength),
            norm(player.power),
            norm(player.agility),
            norm(player.explosive)
          ],
          backgroundColor: "rgba(59,130,246,0.4)",
          borderColor: "#3b82f6",
          borderWidth: 2
        },
        {
          label: "Team Avg",
          data: [
            norm(avg.speed),
            norm(avg.strength),
            norm(avg.power),
            norm(avg.agility),
            norm(avg.explosive)
          ],
          backgroundColor: "rgba(255,255,255,0.15)",
          borderColor: "#aaa",
          borderWidth: 2
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: {
            color: "#ccc"
          }
        }
      },
      scales: {
        r: {
          beginAtZero: true,
          suggestedMax: 100,
          ticks: { display: false },
          grid: { color: "rgba(255,255,255,0.08)" },
          angleLines: { color: "rgba(255,255,255,0.1)" },
          pointLabels: {
            color: "#aaa",
            font: { size: 13, weight: "600" }
          }
        }
      }
    }
  });
}

// ---------- NORMALIZE ----------
function norm(val) {
  return Math.min(val / 5, 100);
}

</script>

</body>
</html>
